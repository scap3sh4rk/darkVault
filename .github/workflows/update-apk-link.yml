name: Update APK download link

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get APK download URL from release
        id: apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(gh release view "${{ github.event.release.tag_name }}" \
            --json assets \
            --jq '.assets[] | select(.name | endswith(".apk")) | .browserDownloadUrl' \
            | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update download link in mkdocs.yml
        run: |
          python3 - <<'EOF'
          import re, sys

          url = "${{ steps.apk.outputs.url }}"
          if not url:
              print("No APK asset found in release — skipping update")
              sys.exit(0)

          with open("mkdocs.yml") as f:
              content = f.read()

          updated = re.sub(
              r'- "Download.*?":.*',
              f'- "Download ↓": {url}',
              content
          )

          with open("mkdocs.yml", "w") as f:
              f.write(updated)

          print(f"Updated APK link to: {url}")
          EOF

      - name: Commit updated link to main
        run: |
          git config user.name  "Parthiv Kumar Nikku"
          git config user.email "develop@parthiv.sec"
          git add mkdocs.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "updated download link in website"
          git push origin main

      # Deploy docs directly — GITHUB_TOKEN commits don't trigger
      # other workflows, so we build and deploy here in the same job.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install MkDocs dependencies
        run: pip install -r requirements.txt

      - name: Deploy updated site to gh-pages
        run: mkdocs gh-deploy --force
